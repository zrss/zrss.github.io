<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">NCCL communication after connection setup</title>
  <desc id="desc">Architecture diagram showing how NCCL reuses connection setup results during one communication operation.</desc>
  <defs>
    <style>
      .bg { fill: #fbfcfe; }
      .title { fill: #172033; font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .subtitle { fill: #5f6b7a; font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .lane { fill: #ffffff; stroke: #d6deea; stroke-width: 1.2; rx: 14; }
      .section-title { fill: #263244; font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .label { fill: #182334; font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .body { fill: #4a5666; font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .small { fill: #667386; font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .code { fill: #243043; font: 600 12px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .host { fill: #eef6ff; stroke: #b8cceb; stroke-width: 1.2; rx: 10; }
      .device { fill: #f7fbf8; stroke: #b7d8c5; stroke-width: 1.2; rx: 10; }
      .conn { fill: #fff6e8; stroke: #e4ca93; stroke-width: 1.2; rx: 10; }
      .proxy { fill: #f7f2ff; stroke: #cbbbe8; stroke-width: 1.2; rx: 10; }
      .net { fill: #fff4f4; stroke: #e9b5b5; stroke-width: 1.2; rx: 10; }
      .note { fill: #fffaf0; stroke: #ead8a6; stroke-width: 1.2; rx: 10; }
      .arrow { stroke: #68778d; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #9aa7b8; stroke-width: 1.5; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrow-soft); }
      .loop { stroke: #74845f; stroke-width: 1.8; fill: none; marker-end: url(#arrow-green); }
      .divider { stroke: #e4e9f0; stroke-width: 1; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#68778d"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa7b8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#74845f"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect class="bg" width="1280" height="820"/>
  <text class="title" x="48" y="54">NCCL 建链后的通信过程</text>
  <text class="subtitle" x="48" y="80">建链产物 ncclConnInfo 被 device kernel 和 proxy progress 共同消费</text>

  <rect class="lane" x="40" y="106" width="1200" height="140" filter="url(#shadow)"/>
  <text class="section-title" x="64" y="134">Host planning / launch</text>

  <rect class="host" x="64" y="158" width="178" height="58"/>
  <text class="label" x="84" y="181">API enqueue</text>
  <text class="code" x="84" y="202">AllReduce / SendRecv</text>

  <rect class="host" x="286" y="158" width="190" height="58"/>
  <text class="label" x="306" y="181">生成 plan</text>
  <text class="code" x="306" y="202">ncclLaunchPrepare</text>

  <rect class="host" x="520" y="158" width="190" height="58"/>
  <text class="label" x="540" y="181">上传 work</text>
  <text class="code" x="540" y="202">uploadWork</text>

  <rect class="host" x="754" y="158" width="190" height="58"/>
  <text class="label" x="774" y="181">投递 proxy op</text>
  <text class="code" x="774" y="202">ncclProxyStart</text>

  <rect class="host" x="988" y="158" width="190" height="58"/>
  <text class="label" x="1008" y="181">启动 kernel</text>
  <text class="code" x="1008" y="202">ncclLaunchKernel</text>

  <path class="arrow" d="M242 187 H286"/>
  <path class="arrow" d="M476 187 H520"/>
  <path class="arrow" d="M710 187 H754"/>
  <path class="arrow" d="M944 187 H988"/>

  <rect class="lane" x="40" y="278" width="1200" height="230" filter="url(#shadow)"/>
  <text class="section-title" x="64" y="306">Device kernel / primitives</text>

  <rect class="device" x="64" y="332" width="202" height="78"/>
  <text class="label" x="84" y="356">读取 work</text>
  <text class="code" x="84" y="379">ncclDevWorkColl</text>
  <text class="code" x="84" y="398">ncclDevWorkP2p</text>

  <rect class="device" x="310" y="332" width="202" height="78"/>
  <text class="label" x="330" y="356">选择算法路径</text>
  <text class="code" x="330" y="379">runRing / runTree</text>
  <text class="code" x="330" y="398">sendrecv</text>

  <rect class="device" x="556" y="332" width="202" height="78"/>
  <text class="label" x="576" y="356">Primitive 操作</text>
  <text class="code" x="576" y="379">directSend</text>
  <text class="code" x="576" y="398">recvReduceDirectSend</text>

  <rect class="device" x="802" y="332" width="202" height="78"/>
  <text class="label" x="822" y="356">slice 循环</text>
  <text class="code" x="822" y="379">waitPeer</text>
  <text class="code" x="822" y="398">reduceCopy / postPeer</text>

  <rect class="conn" x="1042" y="318" width="152" height="106"/>
  <text class="label" x="1062" y="342">连接状态</text>
  <text class="code" x="1062" y="365">ncclConnInfo</text>
  <text class="small" x="1062" y="387">buffs / head / tail</text>
  <text class="small" x="1062" y="407">connFifo / step</text>

  <path class="arrow" d="M266 371 H310"/>
  <path class="arrow" d="M512 371 H556"/>
  <path class="arrow" d="M758 371 H802"/>
  <path class="arrow" d="M1004 371 H1042"/>

  <path class="loop" d="M878 420 C878 466 620 466 620 420"/>
  <text class="small" x="650" y="458">每个 chunk / slice 重复执行 step 协议</text>

  <path class="arrow-soft" d="M1083 216 C1096 250 1102 282 1118 318"/>

  <rect class="lane" x="40" y="540" width="1200" height="154" filter="url(#shadow)"/>
  <text class="section-title" x="64" y="568">Proxy progress / transport</text>

  <rect class="proxy" x="64" y="596" width="210" height="66"/>
  <text class="label" x="84" y="620">Proxy 线程</text>
  <text class="code" x="84" y="642">ncclProxyProgress</text>

  <rect class="proxy" x="318" y="596" width="210" height="66"/>
  <text class="label" x="338" y="620">执行 progress</text>
  <text class="code" x="338" y="642">progressOps</text>

  <rect class="proxy" x="572" y="596" width="210" height="66"/>
  <text class="label" x="592" y="620">NET proxy</text>
  <text class="code" x="592" y="642">send/recvProxyProgress</text>

  <rect class="net" x="826" y="596" width="210" height="66"/>
  <text class="label" x="846" y="620">网络传输</text>
  <text class="code" x="846" y="642">isend / irecv / test</text>

  <rect class="conn" x="1080" y="586" width="126" height="86"/>
  <text class="label" x="1100" y="610">更新状态</text>
  <text class="code" x="1100" y="633">head / tail</text>
  <text class="code" x="1100" y="653">connFifo</text>

  <path class="arrow" d="M274 629 H318"/>
  <path class="arrow" d="M528 629 H572"/>
  <path class="arrow" d="M782 629 H826"/>
  <path class="arrow" d="M1036 629 H1080"/>

  <path class="arrow-soft" d="M1143 586 C1143 520 1128 476 1118 424"/>
  <path class="arrow-soft" d="M849 216 C825 310 746 498 677 596"/>

  <rect class="note" x="72" y="724" width="1136" height="54"/>
  <text class="label" x="92" y="747">边界</text>
  <text class="body" x="150" y="747">建链阶段负责选择 transport、交换 handle、填 ncclConnInfo；通信阶段复用 ncclConnInfo，按 step/FIFO 协议完成本次 API 的数据传输。</text>
  <text class="small" x="150" y="768">P2P direct 路径主要由 device kernel 推进；NET 等路径需要 proxy 线程与 kernel 协同推进。</text>

  <line class="divider" x1="40" y1="262" x2="1240" y2="262"/>
  <line class="divider" x1="40" y1="524" x2="1240" y2="524"/>
</svg>
