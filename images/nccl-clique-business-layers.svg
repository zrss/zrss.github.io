<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">业务侧影响 NCCL clique 的层次</title>
  <desc id="desc">从业务框架、NCCL communicator、拓扑和硬件 clique，到最终 launch 和数据通信顺序的层次图。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#52616f"/>
    </marker>
    <style>
      .bg { fill: #f7f8fb; }
      .layer { fill: #ffffff; stroke: #ccd4df; stroke-width: 1.5; rx: 10; }
      .layer-title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1d2733; }
      .layer-sub { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52616f; }
      .box { stroke-width: 1.2; rx: 8; }
      .box-title { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1d2733; }
      .box-text { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #344251; }
      .flow { fill: none; stroke: #52616f; stroke-width: 2; marker-end: url(#arrow); }
      .note { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667789; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>

  <rect class="layer" x="42" y="36" width="1116" height="150"/>
  <text class="layer-title" x="72" y="74">业务 / 框架层</text>
  <text class="layer-sub" x="72" y="102">业务定义通信成员、rank 顺序、GPU placement 和运行参数；这里通常就是“业务侧 NCCL clique”的来源。</text>
  <rect class="box" x="72" y="124" width="232" height="42" fill="#eaf2ff" stroke="#8eb6ef"/>
  <text class="box-title" x="92" y="151">process group / new_group</text>
  <rect class="box" x="326" y="124" width="190" height="42" fill="#f4ecff" stroke="#b699df"/>
  <text class="box-title" x="349" y="151">rank list / key</text>
  <rect class="box" x="538" y="124" width="210" height="42" fill="#e9f7ef" stroke="#8ccaa5"/>
  <text class="box-title" x="562" y="151">rank -> GPU placement</text>
  <rect class="box" x="770" y="124" width="168" height="42" fill="#fff2db" stroke="#d9b069"/>
  <text class="box-title" x="790" y="151">stream / call order</text>
  <rect class="box" x="960" y="124" width="168" height="42" fill="#f2f4f7" stroke="#aeb8c5"/>
  <text class="box-title" x="986" y="151">env / config</text>

  <path class="flow" d="M600 186 L600 228"/>

  <rect class="layer" x="42" y="228" width="1116" height="150"/>
  <text class="layer-title" x="72" y="266">NCCL communicator 层</text>
  <text class="layer-sub" x="72" y="294">NCCL 没有单独的业务 clique API；业务输入会落成 communicator 的成员关系和 rank 编号。</text>
  <rect class="box" x="96" y="318" width="292" height="42" fill="#eaf2ff" stroke="#8eb6ef"/>
  <text class="box-title" x="118" y="345">ncclUniqueId + nranks + rank</text>
  <rect class="box" x="454" y="318" width="226" height="42" fill="#f4ecff" stroke="#b699df"/>
  <text class="box-title" x="476" y="345">peerInfo allGather</text>
  <rect class="box" x="746" y="318" width="330" height="42" fill="#e9f7ef" stroke="#8ccaa5"/>
  <text class="box-title" x="768" y="345">commHash / intraComm0 / local ranks</text>

  <path class="flow" d="M600 378 L600 420"/>

  <rect class="layer" x="42" y="420" width="1116" height="150"/>
  <text class="layer-title" x="72" y="458">拓扑和硬件 clique 层</text>
  <text class="layer-sub" x="72" y="486">NCCL 根据 rank、busId、NVML fabric 信息和环境变量，搜索 ring/tree/NVLS 图并选择 transport。</text>
  <rect class="box" x="84" y="510" width="232" height="42" fill="#eaf2ff" stroke="#8eb6ef"/>
  <text class="box-title" x="107" y="537">ring / tree / NVLS graph</text>
  <rect class="box" x="350" y="510" width="270" height="42" fill="#f4ecff" stroke="#b699df"/>
  <text class="box-title" x="373" y="537">MNNVL: UUID + cliqueId</text>
  <rect class="box" x="654" y="510" width="222" height="42" fill="#e9f7ef" stroke="#8ccaa5"/>
  <text class="box-title" x="678" y="537">P2P / SHM / NET</text>
  <rect class="box" x="910" y="510" width="176" height="42" fill="#fff2db" stroke="#d9b069"/>
  <text class="box-title" x="933" y="537">channels</text>

  <path class="flow" d="M600 570 L600 612"/>

  <rect class="layer" x="42" y="612" width="1116" height="112"/>
  <text class="layer-title" x="72" y="650">执行和通信顺序层</text>
  <text class="layer-sub" x="72" y="678">group launch 先按本进程内 sibling communicator 聚合；kernel 内的数据顺序由 algorithm、protocol、channel、step/proxy 共同决定。</text>
  <rect class="box" x="86" y="692" width="232" height="30" fill="#eaf2ff" stroke="#8eb6ef"/>
  <text class="box-text" x="108" y="713">ncclGroupStart / End</text>
  <rect class="box" x="356" y="692" width="232" height="30" fill="#f4ecff" stroke="#b699df"/>
  <text class="box-text" x="378" y="713">intraComm0 launch clique</text>
  <rect class="box" x="626" y="692" width="232" height="30" fill="#e9f7ef" stroke="#8ccaa5"/>
  <text class="box-text" x="648" y="713">kernel chunk / step</text>
  <rect class="box" x="896" y="692" width="194" height="30" fill="#fff2db" stroke="#d9b069"/>
  <text class="box-text" x="918" y="713">proxy / network progress</text>
</svg>
